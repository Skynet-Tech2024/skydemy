{% extends 'dashboard/base.html' %}

{% block title %}Home - SKYDEMY{% endblock %}

{% block content %}
<div style="text-align: center; padding: 40px 15px; max-width: 100%;">
    <h1 style="font-size: clamp(28px, 5vw, 48px); color: #1a1a2e; margin-bottom: 15px;">
        Welcome to <span style="color: #f39c12;">SKYDEMY</span>
    </h1>
    <p style="font-size: clamp(16px, 2.5vw, 20px); color: #555; max-width: 600px; margin: 0 auto 30px; padding: 0 15px;">
        Learn at your own pace — Primary, Secondary, and University levels.
    </p>
    
    <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px;">
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" style="background: #f39c12; color: #1a1a2e; padding: 14px 35px; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: clamp(16px, 2vw, 18px); transition: all 0.3s; display: inline-block;">
                📊 Go to Dashboard
            </a>
        {% else %}
            <a href="{% url 'login' %}" style="background: #f39c12; color: #1a1a2e; padding: 14px 35px; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: clamp(16px, 2vw, 18px); transition: all 0.3s; display: inline-block;">
                🔑 Login
            </a>
            <a href="{% url 'register' %}" style="background: #3498db; color: #fff; padding: 14px 35px; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: clamp(16px, 2vw, 18px); transition: all 0.3s; display: inline-block;">
                📝 Register
            </a>
        {% endif %}
    </div>
</div>
{% endblock %}
