{% extends 'dashboard/base.html' %}

{% block title %}Welcome to SKYDEMY{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto; text-align: center; padding: 60px 20px;">
    <h1 style="font-size: 48px; color: #1a1a2e; margin-bottom: 15px;">
        Welcome to <span style="color: #f39c12;">SKYDEMY</span>
    </h1>
    <p style="font-size: 20px; color: #555; max-width: 600px; margin: 0 auto 30px;">
        Learn, teach, and grow — Primary, Secondary, and University levels.
    </p>

    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px;">
        <a href="{% url 'login' %}" style="background: #3498db; color: #fff; padding: 14px 40px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 18px; transition: 0.3s; min-width: 180px;">
            🔑 Login as User
        </a>
        <a href="/admin/login/" style="background: #f39c12; color: #1a1a2e; padding: 14px 40px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 18px; transition: 0.3s; min-width: 180px;">
            🔐 Admin Login
        </a>
        <a href="{% url 'register' %}" style="background: #27ae60; color: #fff; padding: 14px 40px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 18px; transition: 0.3s; min-width: 180px;">
            📝 Create Account
        </a>
    </div>

    <div style="margin-top: 50px; color: #888; font-size: 14px;">
        <p>Already have an account? <a href="{% url 'login' %}" style="color: #f39c12;">Login</a></p>
    </div>
</div>
{% endblock %}
