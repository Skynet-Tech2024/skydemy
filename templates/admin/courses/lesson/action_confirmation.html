{% extends "admin/base_site.html" %}
{% load i18n admin_urls static %}

{% block extrahead %}
    {{ block.super }}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
{% endblock %}

{% block content %}
    <form id="action-form" method="post" action="{% url 'admin:courses_lesson_changelist' %}">
        {% csrf_token %}
        <input type="hidden" name="action" value="{{ action }}">
        <input type="hidden" name="post" value="yes">
        <input type="hidden" name="confirm" value="yes">
        {% for pk in selected_pks %}
            <input type="hidden" name="_selected_action" value="{{ pk }}">
        {% endfor %}
        <input type="hidden" name="index" value="0">
        {% if is_popup %}<input type="hidden" name="_popup" value="1">{% endif %}
        {% if to_field %}<input type="hidden" name="_to_field" value="{{ to_field }}">{% endif %}
    </form>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var actionForm = document.getElementById('action-form');
            var actionName = "{{ action_display }}";
            var count = {{ selected_count }};
            Swal.fire({
                title: '⚠️ Confirm Action',
                html: `You are about to <strong>${actionName}</strong> ${count} lesson(s).<br>This action cannot be undone.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#0B5D3B',
                cancelButtonColor: '#B42318',
                confirmButtonText: '✅ Yes, proceed',
                cancelButtonText: '✖ Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    actionForm.submit();
                } else {
                    window.location.href = '{% url 'admin:courses_lesson_changelist' %}';
                }
            });
        });
    </script>
{% endblock %}
