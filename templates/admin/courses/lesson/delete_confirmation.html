{% extends "admin/base_site.html" %}
{% load i18n admin_urls static %}

{% block extrahead %}
    {{ block.super }}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
{% endblock %}

{% block content %}
    <form id="delete-form" method="post" action="{% url opts|admin_urlname:'delete' object.pk %}">
        {% csrf_token %}
        <input type="hidden" name="post" value="yes">
        <input type="hidden" name="_selected_action" value="{{ object.pk }}">
        {% if is_popup %}<input type="hidden" name="_popup" value="1">{% endif %}
        {% if to_field %}<input type="hidden" name="_to_field" value="{{ to_field }}">{% endif %}
    </form>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var deleteForm = document.getElementById('delete-form');
            Swal.fire({
                title: '⚠️ Delete lesson?',
                html: `You are about to delete <strong>"{{ object.title }}"</strong>.<br>This action cannot be undone.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#B42318',
                cancelButtonColor: '#0B5D3B',
                confirmButtonText: '🗑️ Yes, delete permanently',
                cancelButtonText: '✖ Cancel, keep lesson'
            }).then((result) => {
                if (result.isConfirmed) {
                    deleteForm.submit();
                } else {
                    window.location.href = '{% url opts|admin_urlname:'changelist' %}';
                }
            });
        });
    </script>
{% endblock %}
