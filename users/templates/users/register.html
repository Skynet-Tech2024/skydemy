<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SKYDEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F6F7F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            width: 100%;
            max-width: 460px;
        }
        /* ===== CARD ===== */
        .card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #E5E7EB;
        }
        /* ===== LOGO ===== */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0B7A3B;
            letter-spacing: -0.5px;
        }
        .logo h1 span {
            color: #D4AF37;
        }
        .logo p {
            color: #64748B;
            font-size: 14px;
            margin-top: 4px;
        }
        /* ===== PROGRESS INDICATOR ===== */
        .progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .progress-step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #94A3B8;
        }
        .progress-step.active {
            color: #0B7A3B;
        }
        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #E5E7EB;
            transition: 0.3s;
        }
        .progress-dot.active {
            background: #0B7A3B;
        }
        .progress-line {
            width: 40px;
            height: 2px;
            background: #E5E7EB;
            border-radius: 2px;
        }
        .progress-line.active {
            background: #0B7A3B;
        }
        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 6px;
        }
        .form-group label .required {
            color: #DC2626;
            margin-left: 2px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E5E7EB;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #FFFFFF;
            color: #1F2937;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0B7A3B;
            box-shadow: 0 0 0 3px rgba(11, 122, 59, 0.12);
        }
        .form-group input::placeholder {
            color: #94A3B8;
        }
        .form-group .help-text {
            font-size: 12px;
            color: #64748B;
            margin-top: 4px;
        }
        /* ===== PASSWORD TOGGLE ===== */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 48px;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94A3B8;
            font-size: 16px;
            padding: 4px;
        }
        .toggle-password:hover {
            color: #0B7A3B;
        }
        /* ===== BUTTON ===== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #0B7A3B;
            color: #FFFFFF;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .btn-primary:hover {
            background: #1E9E58;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748B;
        }
        .footer a {
            color: #0B7A3B;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        /* ===== MESSAGES ===== */
        .messages {
            margin-bottom: 20px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .message.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }
        .message.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }
        .message.info {
            background: #DBEAFE;
            color: #1E40AF;
            border: 1px solid #BFDBFE;
        }
        /* ===== REQUIRED FIELDS NOTE ===== */
        .required-note {
            text-align: right;
            font-size: 13px;
            color: #64748B;
            margin-bottom: 16px;
        }
        .required-note span {
            color: #DC2626;
        }
        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
            .logo h1 { font-size: 24px; }
            .progress { gap: 8px; }
            .progress-line { width: 24px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="card">
            <!-- LOGO -->
            <div class="logo">
                <h1>SKY<span>DEMY</span></h1>
                <p>Create your account</p>
            </div>

            <!-- PROGRESS INDICATOR -->
            <div class="progress">
                <div class="progress-step active">
                    <span class="progress-dot active"></span>
                    Step 1 of 2
                </div>
                <span class="progress-line active"></span>
                <div class="progress-step">
                    <span class="progress-dot"></span>
                    Step 2 of 2
                </div>
            </div>

            <!-- MESSAGES -->
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            <!-- FORM -->
            <form method="post" novalidate>
                {% csrf_token %}

                <!-- Required fields note -->
                <div class="required-note">
                    <span>*</span> Required fields
                </div>

                <!-- Username field – used as "Names" -->
                <div class="form-group">
                    <label for="id_username">Names <span class="required">*</span></label>
                    <input type="text" name="username" id="id_username" 
                           placeholder="Enter your full names" 
                           value="{{ form.username.value|default:'' }}"
                           required>
                    <div class="help-text">{{ form.username.help_text }}</div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="id_password1">Password <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" name="password1" id="id_password1" 
                               placeholder="Create a strong password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('id_password1')">
                            👁️
                        </button>
                    </div>
                    <div class="help-text">{{ form.password1.help_text }}</div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="id_password2">Confirm Password <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" name="password2" id="id_password2" 
                               placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('id_password2')">
                            👁️
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-primary">Create Account →</button>
            </form>

            <!-- FOOTER -->
            <div class="footer">
                Already have an account? <a href="{% url 'login' %}">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const isPassword = input.getAttribute('type') === 'password';
            input.setAttribute('type', isPassword ? 'text' : 'password');
            const btn = input.parentElement.querySelector('.toggle-password');
            btn.textContent = isPassword ? '🙈' : '👁️';
        }
    </script>
</body>
</html>
